<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>App glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;min-height:170px;padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;background:var(--bg-content);}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 8px;border-radius:var(--radius-lg);background:linear-gradient(135deg, color-mix(in srgb, var(--hos-sovereign) 4%, transparent), color-mix(in srgb, var(--hos-mediated) 4%, transparent));}
  .item img{width:48px;height:48px}
  .name{font:600 13px/1 var(--font-display);color:var(--fg-1);letter-spacing:-0.01em}
  .role{font:400 11px/1.3 var(--font-text);color:var(--fg-2);text-align:center}
</style></head>
<body><div class="card">
  <div class="item"><img src="../assets/glyph-scribe.svg" alt=""><div class="name">Scribe</div><div class="role">Professional<br/>workspace</div></div>
  <div class="item"><img src="../assets/glyph-veridia.svg" alt=""><div class="name">Veridia</div><div class="role">Patient<br/>health identity</div></div>
  <div class="item"><img src="../assets/glyph-cloudclinic.svg" alt=""><div class="name">CloudClinic</div><div class="role">Service<br/>operations</div></div>
</div></body></html>
