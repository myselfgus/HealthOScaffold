<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;min-height:170px;padding:20px;display:flex;align-items:center;gap:24px;background:var(--bg-content);}
  .mark{width:96px;height:96px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-lg);background:linear-gradient(135deg, color-mix(in srgb, var(--hos-sovereign) 6%, transparent), color-mix(in srgb, var(--hos-mediated) 6%, transparent));}
  .mark svg{width:64px;height:64px}
  .meta{display:flex;flex-direction:column;gap:6px}
  .word{display:flex;align-items:baseline;gap:0}
  .word .h{font:700 38px/1 var(--font-display);letter-spacing:-0.022em;color:var(--fg-1)}
  .word .os{font:700 38px/1 var(--font-display);letter-spacing:-0.022em;background:linear-gradient(135deg,#3B4A6B,#0E7C86);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{font:500 12px/1.4 var(--font-text);color:var(--fg-2);max-width:42ch}
  .row{display:flex;gap:8px;margin-top:4px}
</style></head>
<body><div class="card">
  <div class="mark"><img src="../assets/healthos-mark.svg" alt=""></div>
  <div class="meta">
    <div class="word"><span class="h">Health</span><span class="os">OS</span></div>
    <div class="tag">Sovereign computational environment for health data and clinical operations.</div>
    <div class="row">
      <span class="capsule" data-state="info">macOS 26+</span>
      <span class="capsule" data-state="pending">Liquid Glass</span>
      <span class="capsule" data-state="final">Apple Silicon</span>
    </div>
  </div>
</div></body></html>
