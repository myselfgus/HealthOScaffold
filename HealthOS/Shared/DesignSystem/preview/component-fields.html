<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;padding:20px;background:var(--bg-content);display:flex;flex-direction:column;gap:12px}
  label{font:600 11px/1.2 var(--font-text);color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em}
  .field{display:flex;flex-direction:column;gap:5px}
  input,select,textarea{font:400 13px/1.4 var(--font-text);color:var(--fg-1);background:var(--bg-content);border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:7px 10px;outline:none;box-shadow:var(--shadow-recess)}
  input:focus,select:focus,textarea:focus{box-shadow:var(--focus-ring)}
  textarea{font-family:var(--font-mono);min-height:50px;resize:vertical}
  .seg{display:inline-flex;background:var(--bg-recess);padding:2px;border-radius:var(--radius-md);box-shadow:var(--shadow-recess)}
  .seg button{flex:1;font:500 12px/1 var(--font-text);padding:5px 12px;border:none;background:transparent;color:var(--fg-2);border-radius:6px;cursor:pointer}
  .seg button[aria-selected="true"]{background:var(--bg-content);color:var(--fg-1);box-shadow:var(--shadow-card)}
</style></head>
<body><div class="card">
  <div class="field"><label>Patient token</label>
    <select><option>PT-BR-9C1F-A4E2</option></select>
  </div>
  <div class="field"><label>Capture mode</label>
    <div class="seg"><button aria-selected="true">Seeded text</button><button>Local audio file</button></div>
  </div>
  <div class="field"><label>Capture text (seeded)</label>
    <textarea>Paciente relata dor de cabeça, insônia e piora do sono há uma semana.</textarea>
  </div>
</div></body></html>
