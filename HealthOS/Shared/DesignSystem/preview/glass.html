<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Glass surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{position:relative;box-sizing:border-box;width:100%;height:100%;padding:20px;background:
    radial-gradient(circle at 18% 22%, rgba(59,74,107,0.22), transparent 55%),
    radial-gradient(circle at 78% 78%, rgba(14,124,134,0.22), transparent 55%),
    linear-gradient(135deg, oklch(94% 0.02 230), oklch(92% 0.03 200));
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch}
  .pane{padding:14px;border-radius:var(--radius-lg);display:flex;flex-direction:column;gap:6px;justify-content:center}
  .lbl{font:600 12px/1 var(--font-text);color:#1A1F2E}
  .meta{font:400 10px/1.3 var(--font-mono);color:#3a4453}
</style></head>
<body><div class="card">
  <div class="pane glass-thin"><div class="lbl">thin</div><div class="meta">thinMaterial · cards</div></div>
  <div class="pane glass-regular"><div class="lbl">regular</div><div class="meta">sidebar · panels</div></div>
  <div class="pane glass-thick"><div class="lbl">thick</div><div class="meta">popover · sheet</div></div>
</div></body></html>
