<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;padding:20px;background:var(--bg-content);display:flex;align-items:center;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:78px;height:78px;background:linear-gradient(135deg, color-mix(in srgb, var(--hos-sovereign) 14%, white), color-mix(in srgb, var(--hos-mediated) 14%, white));box-shadow:var(--shadow-card);border:0.5px solid var(--border-hairline)}
  .pill{width:78px;height:32px;background:linear-gradient(135deg, color-mix(in srgb, var(--hos-sovereign) 14%, white), color-mix(in srgb, var(--hos-mediated) 14%, white));box-shadow:var(--shadow-card);border:0.5px solid var(--border-hairline)}
  .lbl{font:600 11px/1.2 var(--font-text);color:var(--fg-1)}
  .meta{font:400 10px/1.2 var(--font-mono);color:var(--fg-3)}
</style></head>
<body><div class="card">
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="meta">6px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="meta">8px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg</div><div class="meta">12px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="meta">16px · sheets</div></div>
  <div class="item"><div class="pill" style="border-radius:var(--radius-pill);margin-top:24px"></div><div class="lbl">pill</div><div class="meta">9999px · capsules</div></div>
</div></body></html>
