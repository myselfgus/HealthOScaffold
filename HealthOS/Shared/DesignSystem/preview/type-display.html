<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;padding:20px;background:var(--bg-content);display:flex;flex-direction:column;gap:10px}
  .row{display:grid;grid-template-columns:88px 1fr 100px;gap:12px;align-items:baseline}
  .lbl{font:500 10px/1.2 var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
  .val{color:var(--fg-1)}
  .meta{font:400 10px/1.2 var(--font-mono);color:var(--fg-3);text-align:right}
</style></head>
<body><div class="card">
  <div class="row"><span class="lbl">largeTitle</span><span class="val t-largeTitle">Sovereign clinical surface</span><span class="meta">26 / 32 · 700</span></div>
  <div class="row"><span class="lbl">title1</span><span class="val t-title1">Active session workspace</span><span class="meta">22 / 28 · 600</span></div>
  <div class="row"><span class="lbl">title2</span><span class="val t-title2">Patient selection</span><span class="meta">17 / 22 · 600</span></div>
  <div class="row"><span class="lbl">title3</span><span class="val t-title3">Capture mode</span><span class="meta">15 / 20 · 600</span></div>
  <div class="row"><span class="lbl">headline</span><span class="val t-headline">SOAP draft preview</span><span class="meta">13 / 16 · 600</span></div>
</div></body></html>
