<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>State capsules</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;padding:20px;background:var(--bg-content);display:flex;flex-direction:column;gap:14px}
  .h{font:600 11px/1.2 var(--font-text);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head>
<body><div class="card">
  <div class="h">Status capsules — every state surface, one component</div>
  <div class="row">
    <span class="capsule" data-state="ready"><span class="dot"></span>ready</span>
    <span class="capsule" data-state="active"><span class="dot"></span>active</span>
    <span class="capsule" data-state="degraded"><span class="dot"></span>degraded</span>
    <span class="capsule" data-state="denied"><span class="dot"></span>governed_deny</span>
    <span class="capsule" data-state="failed"><span class="dot"></span>failed</span>
  </div>
  <div class="row">
    <span class="capsule" data-state="pending"><span class="dot"></span>pending</span>
    <span class="capsule" data-state="final"><span class="dot"></span>final</span>
    <span class="capsule" data-state="withheld"><span class="dot"></span>withheld</span>
    <span class="capsule" data-state="info"><span class="dot"></span>info</span>
  </div>
  <div class="h" style="margin-top:4px">Common composed states</div>
  <div class="row">
    <span class="capsule" data-state="active">session · active</span>
    <span class="capsule" data-state="degraded">transcription · degraded</span>
    <span class="capsule" data-state="pending">draft · awaiting_gate</span>
    <span class="capsule" data-state="final">document · finalized</span>
    <span class="capsule" data-state="withheld">document · withheld</span>
  </div>
</div></body></html>
