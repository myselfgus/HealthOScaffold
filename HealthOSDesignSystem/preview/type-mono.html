<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;height:100%}
  .card{box-sizing:border-box;width:100%;height:100%;padding:20px;background:var(--bg-content);display:flex;flex-direction:column;gap:14px}
  .h{font:600 11px/1.2 var(--font-text);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
  pre{margin:0;font:400 12px/18px var(--font-mono);color:var(--fg-1);background:var(--bg-recess);padding:12px;border-radius:var(--radius-md)}
  .pair{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}
  .pair .k{font:500 11px/1.2 var(--font-text);color:var(--fg-2);text-transform:uppercase;letter-spacing:0.06em}
  .pair .v{font:500 12px/16px var(--font-mono);color:var(--fg-1)}
</style></head>
<body><div class="card">
  <div class="h">SF Mono · transcripts, tokens, audit lines</div>
  <pre>session_id   2F8A4B1C-7D9E-4A2B-B1F0-3C8D9E0F1A2B
disposition  partial_success
issue        TRANSCRIPTION_DEGRADED  audio capture unavailable</pre>
  <div class="pair"><span class="k">civil token</span><span class="v">PT-BR-9C1F-A4E2</span></div>
  <div class="pair"><span class="k">artifact</span><span class="v">obj://drafts/2026-04-29/soap-9c1f.json</span></div>
</div></body></html>
